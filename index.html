<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Q | Intelligent Queue Management</title>
    <meta name="description" content="Enterprise AI-powered queue management platform">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#f0f4ff', 100: '#e0eaff', 200: '#c7d6fe', 300: '#a5b8fc',
                            400: '#8195f8', 500: '#6375f1', 600: '#4f55e5', 700: '#4342ca',
                            800: '#3736a3', 900: '#312f81', 950: '#1e1d4b',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.4s cubic-bezier(0.2, 0, 0, 1)',
                        'slide-up': 'slideUp 0.5s cubic-bezier(0, 0, 0.2, 1)',
                        'pulse-soft': 'pulseSoft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shimmer': 'shimmer 2s linear infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(12px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        pulseSoft: { '0%, 100%': { opacity: '1' }, '50%': { opacity: '0.7' } },
                        shimmer: { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-feature-settings: "cv02", "cv03", "cv04", "cv11"; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .dark .glass { background: rgba(15, 23, 42, 0.75); border: 1px solid rgba(255, 255, 255, 0.08); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(148, 163, 184, 0.4); border-radius: 20px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(71, 85, 105, 0.5); }
        *:focus-visible { outline: 2px solid #4f55e5; outline-offset: 2px; }
        .dark *:focus-visible { outline-color: #8195f8; }
        
        /* Timeline connector */
        .timeline-line::before {
            content: ''; position: absolute; top: 24px; bottom: 0; left: 15px; width: 2px;
            background: #e2e8f0; z-index: 0;
        }
        .dark .timeline-line::before { background: #334155; }
        .timeline-line-complete::before { background: #4f55e5; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-300 antialiased selection:bg-brand-200 dark:selection:bg-brand-900">

    <div id="toast-container" class="fixed top-4 right-4 z-[60] flex flex-col gap-3 pointer-events-none max-w-sm w-full"></div>
    <div id="modal-container" class="fixed inset-0 z-[70] hidden flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm transition-opacity"></div>
    <div id="app" class="min-h-screen flex flex-col"></div>

    <script>
        // ==========================================
        // 1. REALISTIC SIMULATION ENGINE
        // ==========================================
        const Simulator = {
            state: {
                currentUser: null,
                view: 'landing',
                theme: localStorage.getItem('theme') || 'light',
                isQueuePaused: false,
                pauseReason: '',
                lastUpdateMessage: '',
                
                // Core Entities
                services: [
                    { id: 'svc_1', name: 'General Inquiry', avgTime: 12, icon: 'help-circle', color: 'blue' },
                    { id: 'svc_2', name: 'Account Opening', avgTime: 25, icon: 'briefcase', color: 'indigo' },
                    { id: 'svc_3', name: 'Loan Consultation', avgTime: 45, icon: 'banknote', color: 'emerald' }
                ],
                branches: [
                    { id: 'b_1', name: 'Sandton City Branch', address: 'Sandton City, Johannesburg', open: '08:00', close: '17:00' },
                    { id: 'b_2', name: 'Rosebank Mall Branch', address: 'Rosebank Mall, Johannesburg', open: '09:00', close: '18:00' }
                ],
                counters: [
                    { id: 'c_1', name: 'Counter 1', branch: 'b_1', service: 'svc_1', status: 'open', currentTicket: 'A104' },
                    { id: 'c_2', name: 'Counter 2', branch: 'b_1', service: 'svc_2', status: 'open', currentTicket: 'A105' },
                    { id: 'c_3', name: 'Counter 3', branch: 'b_1', service: 'svc_2', status: 'break', currentTicket: null }, // Simulates disruption
                    { id: 'c_4', name: 'Priority Counter', branch: 'b_1', service: 'any', status: 'open', currentTicket: 'P012' }
                ],
                // Queue: position 0 is being served, 1 is next, etc.
                queue: [
                    { id: 't_104', number: 'A104', service: 'svc_1', status: 'serving', counter: 'c_1', isPriority: false, waitTime: 0 },
                    { id: 't_105', number: 'A105', service: 'svc_2', status: 'serving', counter: 'c_2', isPriority: false, waitTime: 0 },
                    { id: 't_106', number: 'A106', service: 'svc_2', status: 'waiting', counter: null, isPriority: false, waitTime: 0 },
                    { id: 't_107', number: 'A107', service: 'svc_2', status: 'waiting', counter: null, isPriority: false, waitTime: 0 },
                    { id: 't_108', number: 'A108', service: 'svc_2', status: 'waiting', counter: null, isPriority: false, waitTime: 0 },
                    { id: 't_109', number: 'A109', service: 'svc_2', status: 'waiting', counter: null, isPriority: false, waitTime: 0 },
                    { id: 't_110', number: 'A110', service: 'svc_2', status: 'waiting', counter: null, isPriority: false, waitTime: 0 },
                    { id: 't_p01', number: 'P012', service: 'svc_2', status: 'waiting', counter: null, isPriority: true, waitTime: 0 }
                ],
                
                // User specific
                userTicket: null, // { id, number, service, status, position, eta, joinedAt }
                bookings: [
                    { id: 'bk_1', service: 'Account Opening', branch: 'Sandton City Branch', date: '2026-07-22', time: '10:00 AM', status: 'upcoming' },
                    { id: 'bk_2', service: 'General Inquiry', branch: 'Rosebank Mall Branch', date: '2026-07-15', time: '02:30 PM', status: 'completed' }
                ],
                notifications: [
                    { id: 'n_1', text: 'Counter 3 is currently on break. Your wait time has increased by ~25 mins.', time: '2 min ago', unread: true, type: 'warning' },
                    { id: 'n_2', text: 'Your booking for Account Opening on 22 July is confirmed.', time: '1 hour ago', unread: false, type: 'success' }
                ],
                analytics: {
                    dailyVolume: 142,
                    avgWaitTime: 18,
                    completionRate: 94,
                    noShowRate: 4,
                    peakHour: '10:00 - 11:30'
                }
            },

            // The Mathematical Heart of the Simulation
            calculateMetrics(serviceId, isPriority) {
                const service = this.state.services.find(s => s.id === serviceId);
                const relevantCounters = this.state.counters.filter(c => 
                    c.branch === 'b_1' && c.status === 'open' && (c.service === serviceId || c.service === 'any')
                );
                const activeCounterCount = Math.max(1, relevantCounters.length);
                
                // Filter queue for this service
                const serviceQueue = this.state.queue.filter(q => q.service === serviceId && q.status === 'waiting');
                const priorityQueue = serviceQueue.filter(q => q.isPriority);
                const normalQueue = serviceQueue.filter(q => !q.isPriority);
                
                let position = 0;
                let peopleAhead = 0;

                if (this.state.userTicket) {
                    if (this.state.userTicket.isPriority) {
                        position = priorityQueue.findIndex(q => q.id === this.state.userTicket.id);
                        peopleAhead = position >= 0 ? position : priorityQueue.length;
                    } else {
                        // Normal users wait behind all priority users + normal users ahead of them
                        position = normalQueue.findIndex(q => q.id === this.state.userTicket.id);
                        peopleAhead = (position >= 0 ? position : normalQueue.length) + priorityQueue.length;
                    }
                }

                // Math: (People Ahead * Avg Service Time) / Active Counters
                // Add 10% buffer for realism, round to nearest 5 minutes for human credibility
                const rawEta = (peopleAhead * service.avgTime) / activeCounterCount;
                const buffer = rawEta * 0.15;
                const minEta = Math.max(5, Math.round((rawEta - buffer) / 5) * 5);
                const maxEta = Math.max(10, Math.round((rawEta + buffer) / 5) * 5);
                
                const totalServiceDuration = service.avgTime;

                return { peopleAhead, activeCounterCount, etaRange: `${minEta}-${maxEta}`, minEta, maxEta, totalServiceDuration, priorityQueueLength: priorityQueue.length };
            },

            // Simulates time passing and random events
            tick() {
                if (this.state.view === 'landing' || this.state.view === 'login') return;
                if (this.state.isQueuePaused) return;

                // Randomly advance queue or trigger events
                const roll = Math.random();
                
                // 15% chance a counter finishes and calls next
                if (roll < 0.15) {
                    this.advanceQueue();
                } 
                // 5% chance of a disruption (counter goes on break)
                else if (roll > 0.95) {
                    const openCounters = this.state.counters.filter(c => c.status === 'open');
                    if (openCounters.length > 1) {
                        const target = openCounters[Math.floor(Math.random() * openCounters.length)];
                        target.status = 'break';
                        this.state.lastUpdateMessage = `${target.name} went on break. Wait times adjusted.`;
                        this.triggerNotification(`⚠️ ${target.name} is temporarily unavailable. ETA updated.`, 'warning');
                        this.recalculateAndRender();
                    }
                }
                // 5% chance of recovery
                else if (roll > 0.90 && roll <= 0.95) {
                    const breakCounters = this.state.counters.filter(c => c.status === 'break');
                    if (breakCounters.length > 0) {
                        const target = breakCounters[0];
                        target.status = 'open';
                        this.state.lastUpdateMessage = `${target.name} is back online. Wait times decreasing!`;
                        this.triggerNotification(`✅ ${target.name} has reopened. Your wait time decreased!`, 'success');
                        this.recalculateAndRender();
                    }
                }

                // If user is waiting, decrement ETA slightly to show "live" feel
                if (this.state.userTicket && this.state.userTicket.status === 'waiting') {
                    const metrics = this.calculateMetrics(this.state.userTicket.service, this.state.userTicket.isPriority);
                    if (metrics.minEta > 5) {
                        // Smooth visual decrement without breaking the math model
                        this.state.userTicket.etaDisplay = `${Math.max(5, metrics.minEta - 1)}-${metrics.maxEta} mins`;
                    }
                    UI.renderCurrentView();
                }
            },

            advanceQueue() {
                // Find first waiting ticket for an open counter
                for (const counter of this.state.counters) {
                    if (counter.status === 'open' && !counter.currentTicket) {
                        // Prioritize priority tickets
                        let nextTicket = this.state.queue.find(q => q.service === counter.service && q.status === 'waiting' && q.isPriority);
                        if (!nextTicket) {
                            nextTicket = this.state.queue.find(q => q.service === counter.service && q.status === 'waiting' && !q.isPriority);
                        }
                        
                        if (nextTicket) {
                            nextTicket.status = 'serving';
                            nextTicket.counter = counter.id;
                            counter.currentTicket = nextTicket.number;
                            
                            // If this is the user's ticket, update state
                            if (this.state.userTicket && this.state.userTicket.id === nextTicket.id) {
                                this.state.userTicket.status = 'serving';
                                this.state.userTicket.counter = counter.name;
                                this.triggerNotification(`🔔 Your turn! Please proceed to ${counter.name}.`, 'success');
                            }
                            this.recalculateAndRender();
                            return; // One action per tick
                        }
                    }
                }
            },

            completeTicket(ticketId, outcome = 'completed') {
                const ticket = this.state.queue.find(q => q.id === ticketId);
                if (!ticket) return;

                const counter = this.state.counters.find(c => c.id === ticket.counter);
                if (counter) counter.currentTicket = null;

                ticket.status = outcome; // 'completed' or 'no-show'
                
                if (this.state.userTicket && this.state.userTicket.id === ticketId) {
                    this.state.userTicket.status = outcome;
                    if (outcome === 'completed') {
                        this.triggerNotification('Service completed. Thank you!', 'success');
                        setTimeout(() => UI.showFeedbackModal(), 1500);
                    } else {
                        this.triggerNotification('Ticket marked as No-Show.', 'error');
                    }
                }
                this.recalculateAndRender();
            },

            recalculateAndRender() {
                if (this.state.userTicket && this.state.userTicket.status === 'waiting') {
                    const m = this.calculateMetrics(this.state.userTicket.service, this.state.userTicket.isPriority);
                    this.state.userTicket.position = m.peopleAhead + 1;
                    this.state.userTicket.etaDisplay = m.etaRange;
                }
                UI.renderCurrentView();
            },

            triggerNotification(text, type = 'info') {
                const newNotif = { id: 'n_' + Date.now(), text, time: 'Just now', unread: true, type };
                this.state.notifications.unshift(newNotif);
                UI.showToast(text, type);
                UI.renderCurrentView(); // Update notification badge
            },

            startSimulation() {
                setInterval(() => this.tick(), 4000); // Tick every 4 seconds
            }
        };

        // ==========================================
        // 2. UI COMPONENT GENERATORS
        // ==========================================
        const UI = {
            showToast: (message, type = 'info') => {
                const container = document.getElementById('toast-container');
                const el = document.createElement('div');
                const styles = {
                    success: 'bg-emerald-50 text-emerald-900 border-emerald-200 dark:bg-emerald-950/80 dark:text-emerald-100 dark:border-emerald-800',
                    error: 'bg-rose-50 text-rose-900 border-rose-200 dark:bg-rose-950/80 dark:text-rose-100 dark:border-rose-800',
                    warning: 'bg-amber-50 text-amber-900 border-amber-200 dark:bg-amber-950/80 dark:text-amber-100 dark:border-amber-800',
                    info: 'bg-brand-50 text-brand-900 border-brand-200 dark:bg-brand-950/80 dark:text-brand-100 dark:border-brand-800'
                };
                const icons = { success: 'check-circle', error: 'x-circle', warning: 'alert-triangle', info: 'info' };
                
                el.className = `pointer-events-auto flex items-start gap-3 px-4 py-3 rounded-xl border shadow-lg shadow-slate-200/50 dark:shadow-none ${styles[type]} animate-slide-up`;
                el.innerHTML = `
                    <i data-lucide="${icons[type]}" class="w-5 h-5 mt-0.5 shrink-0"></i>
                    <div class="flex-1">
                        <p class="text-sm font-medium leading-snug">${message}</p>
                    </div>
                `;
                container.appendChild(el);
                lucide.createIcons();
                setTimeout(() => {
                    el.style.opacity = '0'; el.style.transform = 'translateY(-10px) scale(0.95)';
                    setTimeout(() => el.remove(), 300);
                }, 4000);
            },

            showFeedbackModal: () => {
                const modal = document.getElementById('modal-container');
                modal.classList.remove('hidden');
                modal.innerHTML = `
                    <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-800 w-full max-w-md p-6 animate-slide-up">
                        <div class="text-center mb-6">
                            <div class="w-16 h-16 bg-emerald-100 dark:bg-emerald-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i data-lucide="check-circle" class="w-8 h-8 text-emerald-600 dark:text-emerald-400"></i>
                            </div>
                            <h3 class="text-xl font-bold text-slate-900 dark:text-white">Service Completed</h3>
                            <p class="text-slate-600 dark:text-slate-400 mt-2">How was your experience at Sandton City Branch?</p>
                        </div>
                        <div class="flex justify-center gap-2 mb-6" id="star-rating">
                            ${[1,2,3,4,5].map(i => `<button onclick="UI.rateService(${i})" class="p-2 text-slate-300 hover:text-amber-400 transition-colors"><i data-lucide="star" class="w-8 h-8 fill-current"></i></button>`).join('')}
                        </div>
                        <textarea placeholder="Any additional comments? (Optional)" class="w-full p-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-sm mb-4 focus:ring-2 focus:ring-brand-500 outline-none resize-none" rows="3"></textarea>
                        <button onclick="UI.closeModal(); Simulator.state.userTicket = null; UI.navigate('customer-dashboard');" class="w-full py-3 bg-brand-600 hover:bg-brand-700 text-white rounded-xl font-medium transition-all active:scale-[0.98]">Submit Feedback</button>
                    </div>
                `;
                lucide.createIcons();
            },

            rateService: (stars) => {
                const btns = document.querySelectorAll('#star-rating button');
                btns.forEach((btn, idx) => {
                    btn.className = idx < stars ? 'p-2 text-amber-400 transition-colors' : 'p-2 text-slate-300 hover:text-amber-400 transition-colors';
                });
            },

            closeModal: () => {
                document.getElementById('modal-container').classList.add('hidden');
            },

            navigate: (view) => {
                Simulator.state.view = view;
                window.scrollTo(0, 0);
                UI.renderCurrentView();
            },

            toggleTheme: () => {
                Simulator.state.theme = Simulator.state.theme === 'light' ? 'dark' : 'light';
                localStorage.setItem('theme', Simulator.state.theme);
                document.documentElement.classList.toggle('dark', Simulator.state.theme === 'dark');
                UI.renderCurrentView();
            },

            // --- Reusable Components ---
            Button: (text, onClick, variant = 'primary', icon = null, className = '') => {
                const base = "inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold transition-all duration-200 active:scale-[0.97] focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed";
                const variants = {
                    primary: "bg-brand-600 text-white hover:bg-brand-700 shadow-sm shadow-brand-600/20",
                    secondary: "bg-white text-slate-700 border border-slate-200 hover:bg-slate-50 dark:bg-slate-800 dark:text-slate-200 dark:border-slate-700 dark:hover:bg-slate-700",
                    ghost: "text-slate-600 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800",
                    destructive: "bg-rose-600 text-white hover:bg-rose-700 shadow-sm shadow-rose-600/20",
                    success: "bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm shadow-emerald-600/20"
                };
                return `<button onclick="${onClick}" class="${base} ${variants[variant]} ${className}">
                    ${icon ? `<i data-lucide="${icon}" class="w-4 h-4"></i>` : ''} ${text}
                </button>`;
            },

            Card: (content, className = '') => `
                <div class="bg-white dark:bg-slate-900 border border-slate-200/80 dark:border-slate-800 rounded-2xl shadow-sm ${className}">${content}</div>
            `,

            Badge: (text, variant = 'default') => {
                const v = {
                    default: "bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300",
                    success: "bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400",
                    warning: "bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400",
                    primary: "bg-brand-100 text-brand-700 dark:bg-brand-900/30 dark:text-brand-400",
                    destructive: "bg-rose-100 text-rose-700 dark:bg-rose-900/30 dark:text-rose-400",
                    info: "bg-sky-100 text-sky-700 dark:bg-sky-900/30 dark:text-sky-400"
                };
                return `<span class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-semibold tracking-wide ${v[variant]}">${text}</span>`;
            },

            // --- View Renderers ---
            renderCurrentView: () => {
                const app = document.getElementById('app');
                const views = {
                    landing: Views.landing,
                    login: Views.login,
                    'customer-dashboard': Views.customerDashboard,
                    'booking-wizard': Views.bookingWizard,
                    'queue-tracker': Views.queueTracker,
                    'my-bookings': Views.myBookings,
                    'counter-dashboard': Views.counterDashboard,
                    'manager-dashboard': Views.managerDashboard,
                    'admin-dashboard': Views.adminDashboard
                };
                
                const renderer = views[Simulator.state.view] || Views.landing;
                app.innerHTML = renderer();
                lucide.createIcons();
                document.documentElement.classList.toggle('dark', Simulator.state.theme === 'dark');
            }
        };

        // ==========================================
        // 3. VIEW DEFINITIONS
        // ==========================================
        const Views = {
            landing: () => `
                <div class="flex flex-col min-h-screen relative overflow-hidden">
                    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-brand-100/40 via-slate-50 to-slate-50 dark:from-brand-950/30 dark:via-slate-950 dark:to-slate-950 -z-10"></div>
                    <header class="fixed top-0 w-full z-40 glass border-b border-slate-200/50 dark:border-slate-800/50">
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div class="flex items-center gap-2.5">
                                <div class="w-9 h-9 bg-brand-600 rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-brand-600/20">Q</div>
                                <span class="font-bold text-xl tracking-tight text-slate-900 dark:text-white">Smart Q</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <button onclick="UI.toggleTheme()" class="p-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                                    <i data-lucide="${Simulator.state.theme === 'light' ? 'moon' : 'sun'}" class="w-5 h-5 text-slate-600 dark:text-slate-400"></i>
                                </button>
                                ${UI.Button('Sign In', "UI.navigate('login')", 'secondary')}
                                ${UI.Button('Get Started', "UI.navigate('login')", 'primary')}
                            </div>
                        </div>
                    </header>
                    <main class="flex-1 pt-32 pb-20 px-4 max-w-7xl mx-auto w-full text-center">
                        <div class="max-w-3xl mx-auto animate-slide-up">
                            ${UI.Badge('Enterprise Queue Intelligence v2.0', 'primary')}
                            <h1 class="mt-6 text-5xl sm:text-6xl lg:text-7xl font-bold tracking-tight text-slate-900 dark:text-white leading-[1.1]">
                                The intelligent way to <br/><span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-600 to-indigo-500">manage waiting.</span>
                            </h1>
                            <p class="mt-6 text-lg sm:text-xl text-slate-600 dark:text-slate-400 leading-relaxed max-w-2xl mx-auto">
                                Transform chaotic physical lines into predictable, calm digital experiences. 
                                Built for banks, hospitals, and government departments at national scale.
                            </p>
                            <div class="mt-10 flex flex-col sm:flex-row items-center justify-center gap-4">
                                ${UI.Button('Book an Appointment', "UI.navigate('login')", 'primary', 'calendar', 'px-8 py-4 text-base')}
                                ${UI.Button('View Live Demo', "Simulator.login('manager')", 'secondary', 'play-circle', 'px-8 py-4 text-base')}
                            </div>
                            
                            <div class="mt-20 grid sm:grid-cols-3 gap-6 text-left">
                                ${[ 
                                    { icon: 'clock', title: 'Predictable ETAs', desc: 'Mathematically derived wait times based on live counter capacity and service duration.' },
                                    { icon: 'shield-check', title: 'Enterprise Resilience', desc: 'Role-based access, POPIA-compliant data handling, and offline-first fallbacks.' },

                                <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-lg border-t border-slate-200 dark:border-slate-800 flex justify-around p-2 z-30 pb-safe">
                                    ${currentNav.map(item => `
                                        <button onclick="UI.navigate('${item.id}')" class="flex flex-col items-center gap-1 p-2 rounded-xl w-full ${Simulator.state.view === item.id ? 'text-brand-600 dark:text-brand-400' : 'text-slate-500 dark:text-slate-400'}">
                                            <i data-lucide="${item.icon}" class="w-5 h-5"></i>
                                            <span class="text-[10px] font-bold">${item.label}</span>
                                        </button>
                                    `).join('')}
                                </nav>
                            ` : ''}
                        </div>
                    </div>
                `;
            }
        };

        // ==========================================
        // 5. CONTROLLER & INITIALIZATION
        // ==========================================
        Simulator.login = (role) => {
            const names = { customer: 'Thabo M.', staff: 'Sarah J.', manager: 'David K.', admin: 'System Admin' };
            Simulator.state.currentUser = { name: names[role], role };
            Simulator.state.bookingStep = 1;
            UI.showToast(`Welcome, ${Simulator.state.currentUser.name}`, 'success');
            
            if (role === 'customer') {
                // Simulate an active ticket for demo purposes
                Simulator.state.userTicket = { 
                    id: 't_107', number: 'A107', service: 'svc_2', status: 'waiting', counter: null, 
                    position: 4, etaDisplay: '45-55', joinedAt: new Date() 
                };
            }
            
            const viewMap = { customer: 'customer-dashboard', staff: 'counter-dashboard', manager: 'manager-dashboard', admin: 'admin-dashboard' };
            UI.navigate(viewMap[role]);
        };

        Simulator.logout = () => {
            Simulator.state.currentUser = null;
            Simulator.state.userTicket = null;
            UI.navigate('landing');
        };

        Simulator.toggleCounterStatus = (counterId, status) => {
            const counter = Simulator.state.counters.find(c => c.id === counterId);
            if (counter) {
                counter.status = status;
                const msg = status === 'open' ? `${counter.name} is now open. Wait times decreasing.` : `${counter.name} is on break. Wait times adjusted.`;
                Simulator.state.lastUpdateMessage = msg;
                Simulator.triggerNotification(msg, status === 'open' ? 'success' : 'warning');
                Simulator.recalculateAndRender();
            }
        };

        Simulator.joinWalkIn = () => {
            const newId = 't_' + Math.floor(Math.random() * 1000);
            Simulator.state.userTicket = {
                id: newId, number: 'A' + Math.floor(Math.random() * 900 + 100), service: 'svc_1', 
                status: 'waiting', counter: null, position: 6, etaDisplay: '30-40', joinedAt: new Date()
            };
            Simulator.state.queue.push(Simulator.state.userTicket);
            Simulator.triggerNotification('Walk-in ticket issued successfully!', 'success');
            UI.navigate('queue-tracker');
        };

        Simulator.confirmBooking = () => {
            Simulator.state.bookingStep = 1;
            Simulator.state.userTicket = {
                id: 't_new', number: 'A115', service: 'svc_2', status: 'waiting', counter: null,
                position: 5, etaDisplay: '50-60', joinedAt: new Date()
            };
            Simulator.state.queue.push(Simulator.state.userTicket);
            Simulator.triggerNotification('Appointment booked and queue joined!', 'success');
            UI.navigate('customer-dashboard');
        };

        // Start the simulation heartbeat
        Simulator.startSimulation();

        // Initial Render
        document.addEventListener('DOMContentLoaded', () => {
            UI.renderCurrentView();
        });
    </script>
</body>
</html>
